<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex"/>
  <title>Page Not Found | BC Safety Docs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif; background: #1A1A1A; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; }
    .eyebrow { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #F5C400; margin-bottom: 16px; }
    h1 { font-weight: 800; font-size: clamp(2.2rem, 5vw, 3.6rem); line-height: 1.05; margin-bottom: 18px; }
    h1 em { font-style: normal; color: #F5C400; }
    p { color: #888; max-width: 460px; line-height: 1.7; margin-bottom: 32px; }
    .links { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
    a.btn { display: inline-block; background: #F5C400; color: #1A1A1A; font-size: 0.95rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 14px 28px; border-radius: 3px; text-decoration: none; }
    a.plain { display: inline-block; color: #aaa; font-size: 0.95rem; padding: 14px 10px; text-decoration: underline; }
  </style>
</head>
<body>
  <p class="eyebrow">Error 404</p>
  <h1>That page doesn't <em>exist.</em></h1>
  <p>The page you're looking for may have moved or never existed. Head back to the homepage to find BC-specific safety document templates.</p>
  <div class="links">
    <a class="btn" href="/">Back to Homepage</a>
    <a class="plain" href="mailto:info@bcsafetydocs.com">Contact us</a>
  </div>
</body>
</html>
